name: Extension Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from manifests
        id: get_version
        run: |
          CHROME_VERSION=$(grep '"version"' manifest.json | sed -E 's/.*"version": "([^"]+)".*/\1/')
          FIREFOX_VERSION=$(grep '"version"' manifest_firefox.json | sed -E 's/.*"version": "([^"]+)".*/\1/')

          VERSION=$CHROME_VERSION
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$CHROME_VERSION" != "$FIREFOX_VERSION" ]; then
            echo "::warning::Chrome version ($CHROME_VERSION) != Firefox version ($FIREFOX_VERSION)"
          fi

      - name: Delete existing release if it exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Deleting existing release v${VERSION}..."
            gh release delete "v${VERSION}" --yes
            echo "Existing release deleted"
          else
            echo "No existing release found for v${VERSION}"
          fi

      - name: Build Chrome extension package
        run: |
          echo "Building Chrome extension..."
          mkdir -p temp-chrome-extension
          cp manifest.json temp-chrome-extension/manifest.json
          cp content.js temp-chrome-extension/
          cp background.js temp-chrome-extension/
          cp telemetry.js temp-chrome-extension/
          cp styles.css temp-chrome-extension/
          cp catpuccin.css temp-chrome-extension/
          cp -r assets temp-chrome-extension/assets
          cp -r themeassets temp-chrome-extension/themeassets

          (cd temp-chrome-extension && zip -r "../macondo-utils-chrome-v${VERSION}.zip" .)
          rm -rf temp-chrome-extension
          echo "Chrome extension packaged: macondo-utils-chrome-v${VERSION}.zip"

      - name: Build Firefox extension package
        run: |
          echo "Building Firefox extension..."
          mkdir -p temp-firefox-extension
          cp manifest_firefox.json temp-firefox-extension/manifest.json
          cp content.js temp-firefox-extension/
          cp background.js temp-firefox-extension/
          cp telemetry.js temp-firefox-extension/
          cp styles.css temp-firefox-extension/
          cp catpuccin.css temp-firefox-extension/
          cp -r assets temp-firefox-extension/assets
          cp -r themeassets temp-firefox-extension/themeassets

          (cd temp-firefox-extension && zip -r "../macondo-utils-firefox-v${VERSION}.zip" .)
          rm -rf temp-firefox-extension
          echo "Firefox extension packaged: macondo-utils-firefox-v${VERSION}.zip"

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: macondo-utils-chrome-v${{ env.VERSION }}
          path: macondo-utils-chrome-v${{ env.VERSION }}.zip
          retention-days: 30

      - name: Upload Firefox extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: macondo-utils-firefox-v${{ env.VERSION }}
          path: macondo-utils-firefox-v${{ env.VERSION }}.zip
          retention-days: 30

      - name: Create unified release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating unified release v${VERSION}..."
          gh release create "v${VERSION}" \
            --title "Macondo Utils v${VERSION} - Chrome & Firefox" \
            --notes-file README.md \
            "macondo-utils-chrome-v${VERSION}.zip" \
            "macondo-utils-firefox-v${VERSION}.zip"
          echo "Release created successfully"

      - name: Summary
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "- Version: v${VERSION}"
            echo "- Chrome: macondo-utils-chrome-v${VERSION}.zip"
            echo "- Firefox: macondo-utils-firefox-v${VERSION}.zip"
            echo "- URL: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
          } >> "$GITHUB_STEP_SUMMARY"
